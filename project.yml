# XcodeGen spec for the native macOS app bundle. Regenerate the project with:
#   xcodegen generate
# The generated CaseCiter.xcodeproj is disposable (git-ignored) — this file is the
# source of truth. SwiftPM (Package.swift) still builds the CLI/tests; this target
# is the real, signable .app that supports launch-at-login (SMAppService needs a
# proper bundle id) and the Accessibility/AppleEvents permissions for paste-back.
name: CaseCiter
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  # The local SwiftPM package, for its library products (the pure formatter + the
  # CourtListener client). Reused as-is; no source duplication.
  CaseCiter:
    path: .
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  CaseCiter:
    type: application
    platform: macOS
    # Compile the agent UI sources directly into the app target. The bundled SCOTUS
    # index now lives in the CourtListener package target (LocalCaseIndex), so it rides
    # in via that product's generated resource bundle and is found through Bundle.module
    # — no Copy Bundle Resource here.
    sources:
      - path: Sources/App
      - path: Packaging/Assets.xcassets
    dependencies:
      - package: CaseCiter
        product: BluebookFormat
      - package: CaseCiter
        product: CourtListener
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danepps.CaseCiter
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Packaging/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        # Local-first distribution: sign with the Development cert so SMAppService can
        # register a login item. Hardened runtime/sandbox stay off — the app posts ⌘V
        # into other apps (Accessibility) and must not be sandboxed.
        # Automatic signing with your Apple Development team — a stable signature that
        # SMAppService (launch-at-login) accepts. Baked in here so `xcodegen generate`
        # preserves it; the project is regenerated from this file, so signing set only
        # in Xcode's GUI gets wiped on the next regenerate.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "82H77TF7AH"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
